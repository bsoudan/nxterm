# termd-tui configuration
# Place at ~/.config/termd-tui/config.toml
#
# If this file does not exist, termd-tui falls back to the first listen
# address from ~/.config/termd/server.toml (if present).

# Server address (same as --socket flag)
# connect = "unix:/tmp/termd.sock"
# connect = "tcp:myserver:9090"
# connect = "ssh://user@myserver:2222"

# Command to run in new regions
# command = "bash"

# Enable debug logging
# debug = false
