name: termd
arch: ${GOARCH}
platform: linux
version: ${VERSION}
release: 1${DIST}
description: Terminal multiplexer with client-server architecture
maintainer: termd maintainers
license: MIT
contents:
  - src: termd
    dst: /usr/bin/termd
  - src: termd-tui
    dst: /usr/bin/termd-tui
  - src: ./termd-tui
    dst: /usr/bin/ttui
    type: symlink
  - src: termctl
    dst: /usr/bin/termctl
  - src: termd.service
    dst: /usr/lib/systemd/user/termd.service
    type: config
